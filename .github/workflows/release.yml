# Builds and publishes a jdk release. A tag push (`v*`) signs the artifacts
# (keyless cosign over SHA256SUMS plus SLSA build-provenance attestations),
# publishes a GitHub release and then the crates.io crates (jdk-resolve,
# jdk-core, jdk, in dependency order — needs the CARGO_REGISTRY_TOKEN secret);
# a manual run is a dry-run that only builds and uploads the same artifacts as
# workflow artifacts (unsigned), so the pipeline can be exercised without
# cutting a release.
#
# Everything runs on Windows: the shim, the Defender scan and the zips are all
# Windows-native. aarch64 is best-effort (continue-on-error) and never blocks
# the x64 release.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Least privilege: the default token can only read; the job elevates to
# contents: write for `gh release create`, which only runs on a tag.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: windows-2025
    permissions:
      contents: write
      # Keyless cosign signing and build-provenance attestation both mint their
      # identity from the job's OIDC token.
      id-token: write
      attestations: write
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      # rust-toolchain.toml pins the toolchain and lists the aarch64 target;
      # rustup auto-installs both on the first cargo call.

      # cargo-auditable embeds the dependency SBOM in jdk.exe; cargo-audit
      # fails the build on a known-vulnerable dependency.
      - name: install cargo-auditable and cargo-audit
        uses: taiki-e/install-action@ed67fa35ac944f3a9b33f12c4dd43b6f31a47e20  # v2
        with:
          tool: cargo-auditable,cargo-audit

      - name: resolve release version
        id: meta
        run: |
          $cargo = (Select-String -Path Cargo.toml -Pattern '^version = "([^"]+)"' | Select-Object -First 1).Matches[0].Groups[1].Value
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
            if ($version -ne $cargo) {
              throw "tag v$version does not match Cargo.toml workspace version $cargo - bump Cargo.toml or retag"
            }
          } else {
            # dry-run: the workspace version is the single source of truth.
            $version = $cargo
          }
          # A release must be described: fail early (dry-run included) if the
          # CHANGELOG has no section for this version.
          if (-not (Select-String -Path CHANGELOG.md -Pattern "^## \[$version\]" -Quiet)) {
            throw "CHANGELOG.md has no '## [$version]' section - add release notes for $version before releasing"
          }
          Add-Content -Path $env:GITHUB_OUTPUT -Value "version=$version"
          Write-Host "release version: $version"

      - name: audit dependencies for known vulnerabilities
        run: cargo audit

      - name: build jdk.exe (x64, SBOM embedded)
        run: cargo auditable build --release -p jdk --bin jdk

      - name: build jdk-shim.exe (x64, size profile)
        run: cargo build --profile release-shim -p jdk-shim --bin jdk-shim

      - name: shim size gate (< 1 MiB)
        run: |
          $shim = Get-Item target/release-shim/jdk-shim.exe
          Write-Host "jdk-shim.exe: $($shim.Length) bytes"
          if ($shim.Length -ge 1MB) { throw "jdk-shim.exe is $($shim.Length) bytes, gate is < 1 MiB" }

      - name: build aarch64 (best-effort)
        id: arm64
        continue-on-error: true
        run: |
          cargo auditable build --release -p jdk --bin jdk --target aarch64-pc-windows-msvc
          cargo build --profile release-shim -p jdk-shim --bin jdk-shim --target aarch64-pc-windows-msvc

      # Each zip carries jdk.exe, jdk-shim.exe side by side (what `jdk setup`
      # needs) plus LICENSE and README.md. A `<file>.sha256` sidecar
      # (`<hash>  <name>`, lowercase — what install.ps1 reads) accompanies every
      # artifact, install.ps1 included.
      - name: assemble release artifacts
        run: |
          $version = '${{ steps.meta.outputs.version }}'
          $dist = Join-Path $PWD 'dist'
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          function New-Bundle([string]$Arch, [string]$JdkExe, [string]$ShimExe) {
            if (-not (Test-Path $JdkExe) -or -not (Test-Path $ShimExe)) {
              Write-Host "skip $Arch - binaries not present (best-effort build did not produce them)"
              return
            }
            $stage = Join-Path $env:RUNNER_TEMP "stage-$Arch"
            New-Item -ItemType Directory -Force -Path $stage | Out-Null
            Copy-Item $JdkExe  (Join-Path $stage 'jdk.exe')
            Copy-Item $ShimExe (Join-Path $stage 'jdk-shim.exe')
            Copy-Item LICENSE, README.md $stage
            $zip = Join-Path $dist "jdk-v$version-windows-$Arch.zip"
            Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zip -Force
            Write-Host "packaged $zip"
          }

          New-Bundle 'x64'   'target/release/jdk.exe'                          'target/release-shim/jdk-shim.exe'
          New-Bundle 'arm64' 'target/aarch64-pc-windows-msvc/release/jdk.exe'  'target/aarch64-pc-windows-msvc/release-shim/jdk-shim.exe'

          Copy-Item install.ps1 $dist

          $artifacts = Get-ChildItem $dist -File | Where-Object { $_.Extension -ne '.sha256' }
          # Per-file sidecar (what install.ps1 reads) plus one aggregate
          # SHA256SUMS (what cosign signs and `sha256sum -c` verifies).
          $sums = foreach ($f in $artifacts) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLowerInvariant()
            [IO.File]::WriteAllText("$($f.FullName).sha256", "$hash  $($f.Name)`n")
            "$hash  $($f.Name)"
          }
          [IO.File]::WriteAllText((Join-Path $dist 'SHA256SUMS'), ($sums -join "`n") + "`n")
          Get-ChildItem $dist -File | Select-Object Name, Length | Format-Table -AutoSize

      - name: Scan with Microsoft Defender
        run: |
          # https://learn.microsoft.com/ja-jp/defender-endpoint/command-line-arguments-microsoft-defender-antivirus
          $defenderPath = "${env:ProgramFiles}/Windows Defender/MpCmdRun.exe"

          Write-Host "Updating Microsoft Defender signatures..."
          & $defenderPath -SignatureUpdate

          Write-Host "Scan packages..."
          $filePath = (Resolve-Path -Path "dist").Path
          & $defenderPath -Scan -ScanType 3 -File $filePath -DisableRemediation

      # Keyless: cosign signs SHA256SUMS with the job's OIDC identity, no
      # long-lived key. The .sigstore.json bundle ships with the release and
      # verifies with `cosign verify-blob`.
      - name: install cosign
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: sign SHA256SUMS (keyless)
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: cosign sign-blob --yes dist/SHA256SUMS --bundle dist/SHA256SUMS.sigstore.json

      # SLSA build provenance for the release zips, verifiable with
      # `gh attestation verify <zip> --repo isacgalvao/jdk`.
      - name: attest build provenance
        if: github.event_name == 'push' && github.ref_type == 'tag'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: dist/jdk-*.zip

      - name: upload workflow artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: jdk-${{ steps.meta.outputs.version }}-windows
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: publish GitHub release
        if: github.event_name == 'push' && github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = '${{ steps.meta.outputs.version }}'

          # Release notes are the CHANGELOG section for this version, verbatim.
          $lines = Get-Content CHANGELOG.md
          $start = ($lines | Select-String -Pattern "^## \[$version\]" | Select-Object -First 1).LineNumber
          if (-not $start) { throw "CHANGELOG.md has no '## [$version]' section" }
          $section = @()
          for ($i = $start; $i -lt $lines.Count; $i++) {
            if ($lines[$i] -match '^## \[' -or $lines[$i] -match '^\[.+\]:') { break }
            $section += $lines[$i]
          }
          $changelog = ($section -join "`n").Trim()

          $fence = '```'
          $notes = @"
          $changelog

          ---

          **Install (PowerShell)**

          ${fence}powershell
          irm https://raw.githubusercontent.com/isacgalvao/jdk/master/install.ps1 | iex
          $fence

          **Verify (optional)**

          ${fence}bash
          # signature over the checksums (keyless, Sigstore)
          cosign verify-blob SHA256SUMS --bundle SHA256SUMS.sigstore.json \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-identity-regexp '^https://github.com/isacgalvao/jdk/.github/workflows/release.yml@'
          # build provenance for a downloaded zip
          gh attestation verify jdk-v$version-windows-x64.zip --repo isacgalvao/jdk
          $fence

          See the [README](https://github.com/isacgalvao/jdk#readme) for the command reference and the full setup.
          "@
          $assets = Get-ChildItem dist -File | ForEach-Object { $_.FullName }
          gh release create $env:GITHUB_REF_NAME --title "jdk $env:GITHUB_REF_NAME" --notes $notes @assets

  # After a tag's release build/scan and GitHub release succeed, publish the
  # three crates.io crates in dependency order. Windows-native so the
  # `cargo publish` verification build (jdk-core/jdk are Windows-only) matches
  # the manual publish. cargo waits for each crate to be indexed before the
  # next resolves. jdk-index-gen and test-support are `publish = false`;
  # jdk-shim is not a published crate. Requires the CARGO_REGISTRY_TOKEN
  # secret (a crates.io API token) — absent it, this job fails.
  publish-crates:
    needs: release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7

      # rust-toolchain.toml pins the toolchain; rustup auto-installs it on the
      # first cargo call.

      - name: publish to crates.io (jdk-resolve -> jdk-core -> jdk)
        shell: bash
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          cargo publish -p jdk-resolve
          cargo publish -p jdk-core
          cargo publish -p jdk
