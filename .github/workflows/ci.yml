name: ci

on:
  pull_request:
  push:
    branches: [master, main]

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4  # stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --profile release-shim -p jdk-shim --bin jdk-shim
      - name: shim size gate (< 1 MiB)
        shell: pwsh
        run: |
          $shim = Get-Item target/release-shim/jdk-shim.exe
          Write-Host "jdk-shim.exe: $($shim.Length) bytes"
          if ($shim.Length -ge 1MB) { throw "jdk-shim.exe is $($shim.Length) bytes, gate is < 1 MiB" }
